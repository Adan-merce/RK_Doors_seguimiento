<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Perfil Operador</title>
<link rel="stylesheet" type="text/css" href="estilos.css">
</head>
<body>
<h1>Bienvenido, Operador</h1>

<h2>Subir Archivos</h2>
<form id="uploadForm" action="upload.php" method="post" enctype="multipart/form-data">
    <div>
        <h3>Avances</h3>
        <input type="file" name="avance_file">
    </div>
    <div>
        <h3>Evidencia</h3>
        <input type="file" name="evidencia_file">
    </div>
    <div>
        <h3>Reporte</h3>
        <input type="file" name="reporte_file">
    </div>
    <button type="submit">Subir Archivos</button>
</form>

<h2>Seguimiento</h2>
<div id="seguimientoContainer">
    <!-- Aquí se mostrará el registro de seguimiento -->
</div>

<script src="script.js"></script>

<!-- Botón para solicitar envío por email -->
<button id="enviarCorreoBtn">Enviar a Correo</button>

<!-- Contenedor que se mostrará al hacer clic -->
<div id="correoContainer" style="display:none; margin-top:20px; padding:15px; border:1px solid #ccc; background:#f9f9f9; border-radius:8px; max-width:400px;">
    <p>Ingresa tu correo electrónico:</p>
    <input type="email" id="correoInput" placeholder="ejemplo@correo.com" style="width:100%; padding:8px; margin-top:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:4px;">
    <br>
    <button id="enviarCorreoBtn2" style="padding:10px 15px; background-color:#007BFF; color:#fff; border:none; border-radius:4px; cursor:pointer;">Enviar</button>
    <p id="mensajeEnvio" style="margin-top:10px;"></p>
</div>

<script>
  // Mostrar el formulario al hacer clic en el botón
  document.getElementById('enviarCorreoBtn').addEventListener('click', function() {
      document.getElementById('correoContainer').style.display = 'block';
  });
  // Acción al hacer clic en "Enviar"
  document.getElementById('enviarCorreoBtn2').addEventListener('click', function() {
      const email = document.getElementById('correoInput').value;
      const mensaje = document.getElementById('mensajeEnvio');
      if (email) {
          // Aquí puedes integrar tu lógica para enviar el email
          mensaje.style.color = 'green';
          mensaje.textContent = 'Correo enviado a: ' + email;
      } else {
          mensaje.style.color = 'red';
          mensaje.textContent = 'Por favor, ingresa un correo válido.';
      }
  });
</script>
</body>
</html>

</body>
</html>
