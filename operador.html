<h2>Subir Archivos</h2>
<form id="uploadForm" action="upload.php" method="post" enctype="multipart/form-data">
    <h3>Avances</h3>
    <input type="file" name="avance_file" />
    <h3>Evidencia</h3>
    <input type="file" name="evidencia_file" />
    <h3>Reporte</h3>
    <input type="file" name="reporte_file" />
</form>

<!-- Botón para registrar archivos en la hoja -->
<button id="registrarBtn">Registrar en Hoja</button>

<script>
  document.getElementById('registrarBtn').addEventListener('click', function() {
    // Obtener los archivos seleccionados
    const avances = document.querySelector('input[name="avance_file"]').files;
    const evidencia = document.querySelector('input[name="evidencia_file"]').files;
    const reporte = document.querySelector('input[name="reporte_file"]').files;

    // Crear un array con los nombres de los archivos
    const archivos = [];

    if (avances.length > 0) {
      archivos.push(avances[0].name);
    }
    if (evidencia.length > 0) {
      archivos.push(evidencia[0].name);
    }
    if (reporte.length > 0) {
      archivos.push(reporte[0].name);
    }

    // URL de tu endpoint (reemplaza con la que tienes)
    const url = 'https://script.google.com/macros/s/AKfycbzshJ5WtxS43BElsheKnYkWjHgaKnWwOMjk0NmILG8lLoCrglcmodvFZz1xWOiWqV8w/exec';

    // Enviar los datos a la API
    fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ archivos: archivos })
    })
    .then(response => response.text())
    .then(data => {
      alert('Respuesta del servidor: ' + data);
    })
    .catch(error => {
      alert('Error al enviar los datos: ' + error);
    });
  });
</script>
</html>
