<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" type="text/css" href="estilos.css" />
    <button id="crearRegistroBtn">Crear Registro Operador</button>
<button id="crearSupervisorBtn">Crear Registro Supervisor</button>
<button id="crearDirectorBtn">Crear Registro Director</button>
</head>
<body>
    <h1>Bienvenido</h1>
    <form id="loginForm">
        <div class="form-group">
            <label for="usuario">Usuario:</label>
            <input type="text" id="usuario" name="usuario" required>
        </div>
        <div class="form-group">
            <label for="contraseña">Contraseña:</label>
            <input type="password" id="contraseña" name="contraseña" required>
        </div>
        <button type="submit">Iniciar Sesión</button>
    </form>
    <p id="mensajeError" style="color:red;"></p>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('loginForm');
        const mensajeError = document.getElementById('mensajeError');

        form.addEventListener('submit', function(event) {
          event.preventDefault();

          const usuario = document.getElementById('usuario').value;
          const contrasena = document.getElementById('contraseña').value;

          // Enviar datos al backend
          fetch('http://localhost:3000/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ usuario: usuario, contrasena: contrasena })
          })
          .then(response => response.json())
          .then(data => {
            if (data.nivel) {
              // Si la respuesta tiene el nivel, login correcto
              mensajeError.style.color = 'green';
              mensajeError.textContent = 'Ingreso correcto! Nivel: ' + data.nivel;
              // Aquí puedes redirigir o hacer otra acción
            } else {
              // Error en login
              mensajeError.style.color = 'red';
              mensajeError.textContent = data.error || 'Error en la login.';
            }
          })
          .catch(error => {
            mensajeError.style.color = 'red';
            mensajeError.textContent = 'Error en la comunicación con el servidor.';
            console.error('Error:', error);
          });
        });
      }); asi debe quedar el indice.html? o a cual html deberia agregar: <button id="crearRegistroBtn">Crear Registro Operador</button>
<button id="crearSupervisorBtn">Crear Registro Supervisor</button>
<button id="crearDirectorBtn">Crear Registro Director</button>

    </script>
</body>
</html>
