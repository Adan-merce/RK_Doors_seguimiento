<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" type="text/css" href="estilos.css" />
</head>
<body>
    <h1>Bienvenido</h1>
    <form id="loginForm">
        <div class="form-group">
            <label for="usuario">Usuario:</label>
            <input type="text" id="usuario" name="usuario" required>
        </div>
        <div class="form-group">
            <label for="contraseña">Contraseña:</label>
            <input type="password" id="contraseña" name="contraseña" required>
        </div>
        <button type="submit">Iniciar Sesión</button>
    </form>
    <p id="mensajeError" style="color:red;"></p>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('loginForm');
        const mensajeError = document.getElementById('mensajeError');

        // Usuarios definidos internamente
        const usuarios = [
          { usuario: 'Operacion_RK', contrasena: 'Ope_Rk_doors_0198', nivel: 'Operador' },
          { usuario: 'Supervisor_RK', contrasena: 'Super_Rk_doors_9180', nivel: 'Supervisor' },
          { usuario: 'Direccion_RK', contrasena: 'Dirrec_Rk_doors_0000', nivel: 'Director' }
        ];

        form.addEventListener('submit', function(event) {
          event.preventDefault();

          const usuario = document.getElementById('usuario').value;
          const contrasena = document.getElementById('contraseña').value;

          // Buscar usuario en la lista interna
          const user = usuarios.find(u => u.usuario === usuario && u.contrasena === contrasena);

          if (user) {
            // Datos correctos
            mensajeError.style.color = 'green';
            mensajeError.textContent = 'Datos correctos! Nivel: ' + user.nivel;
            // Aquí puedes redirigir según el nivel
            if (user.nivel === 'Operador') {
              // window.location.href = 'operador.html'; // descomenta si tienes esa página
            }
          } else {
            // Usuario o contraseña incorrectos
            mensajeError.style.color = 'red';
            mensajeError.textContent = 'Usuario o contraseña incorrectos.';
          }
        });
      });
    </script>
</body>
</html>
