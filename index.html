<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" type="text/css" href="estilos.css" />
</head>
<body>
    <h1>Bienvenido</h1>
    
    <!-- Aquí los botones para crear registros -->
    <button id="crearRegistroBtn">Crear Registro Operador</button>
    <button id="crearSupervisorBtn">Crear Registro Supervisor</button>
    <button id="crearDirectorBtn">Crear Registro Director</button>
    
    <form id="loginForm">
        <div class="form-group">
            <label for="usuario">Usuario:</label>
            <input type="text" id="usuario" name="usuario" required>
        </div>
        <div class="form-group">
            <label for="contraseña">Contraseña:</label>
            <input type="password" id="contraseña" name="contraseña" required>
        </div>
        <button type="submit">Iniciar Sesión</button>
    </form>
    <p id="mensajeError" style="color:red;"></p>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('loginForm');
        const mensajeError = document.getElementById('mensajeError');

        form.addEventListener('submit', function(event) {
          event.preventDefault();

          const usuario = document.getElementById('usuario').value;
          const contrasena = document.getElementById('contraseña').value;

          // Enviar datos al backend
          fetch('http://localhost:3000/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ usuario: usuario, contrasena: contrasena })
          })
          .then(response => response.json())
          .then(data => {
            if (data.nivel) {
              // Si nivel es Operador, redirige
              if (data.nivel === 'Operador') {
                window.location.href = 'operador.html'; // ajusta la ruta si es necesario
              } else {
                // otros niveles
                mensajeError.style.color = 'green';
                mensajeError.textContent = 'Ingreso correcto! Nivel: ' + data.nivel;
              }
            } else {
              // Error en login
              mensajeError.style.color = 'red';
              mensajeError.textContent = data.error || 'Error en la login.';
            }
          })
          .catch(error => {
            mensajeError.style.color = 'red';
            mensajeError.textContent = 'Error en la comunicación con el servidor.';
            console.error('Error:', error);
          });
        });

        // Aquí los eventos para los botones de crear registros
        document.getElementById('crearRegistroBtn').addEventListener('click', () => {
          crearRegistro('Operador');
        });
        document.getElementById('crearSupervisorBtn').addEventListener('click', () => {
          crearRegistro('Supervisor');
        });
        document.getElementById('crearDirectorBtn').addEventListener('click', () => {
          crearRegistro('Director');
        });

        function crearRegistro(tipo) {

          // Por ejemplo, obtener archivos y crear el registro en el contenedor
          // (Este código ya lo tienes en tus ejemplos previos)
        }
      });
    </script>
</body>
</html>

</body>
</html>
