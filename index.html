<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Iniciar Sesión Sin Servidor</title>
</head>
<body>
    <h1>Bienvenido</h1>
    <form id="loginForm">
        <div>
            <label for="usuario">Usuario:</label>
            <input type="text" id="usuario" required>
        </div>
        <div>
            <label for="contraseña">Contraseña:</label>
            <input type="password" id="contraseña" required>
        </div>
        <button type="submit">Iniciar Sesión</button>
    </form>
    <p id="mensaje" style="color:red;"></p>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const usuarioIngresado = document.getElementById('usuario').value;
            const contrasenaIngresada = document.getElementById('contraseña').value;
            const mensaje = document.getElementById('mensaje');

            // Lista de usuarios definidos en código
            const usuarios = [
                { usuario: 'Operacion_RK', contrasena: 'Ope_Rk_doors_0198', nivel: 'Operador' },
                { usuario: 'Supervisor_RK', contrasena: 'Super_Rk_doors_9180', nivel: 'Supervisor' },
                { usuario: 'Direccion_RK', contrasena: 'Dirrec_Rk_doors_0000', nivel: 'Director' }
            ];

            // Buscar usuario en la lista
            const usuarioValido = usuarios.find(
                u => u.usuario === usuarioIngresado && u.contrasena === contrasenaIngresada
            );

            if (usuarioValido) {
                // Usuario y contraseña correctos
                mensaje.style.color = 'green';
                mensaje.textContent = 'Datos correctos! Nivel: ' + usuarioValido.nivel;

                // Aquí puedes redirigir a otra página si quieres
                // Ejemplo: window.location.href = 'operador.html';
            } else {
                // Datos incorrectos
                mensaje.style.color = 'red';
                mensaje.textContent = 'Usuario o contraseña incorrectos.';
            }
        });
    </script>
</body>
</html>
