<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" type="text/css" href="estilos.css">
</head>
<body>
    <h1>Bienvenido</h1>
    <form id="loginForm">
        <div class="form-group">
            <label for="usuario">Usuario:</label>
            <input type="text" id="usuario" name="usuario">
        </div>
        <div class="form-group">
            <label for="contraseña">Contraseña:</label>
            <input type="password" id="contraseña" name="contraseña">
        </div>
        <button type="submit">Iniciar Sesión</button>
    </form>
    <p id="mensajeError" style="color:red;"></p>

    <script>
      // Código JavaScript corregido
      document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('loginForm');
        const mensajeError = document.getElementById('mensajeError');

        form.addEventListener('submit', function(event) {
          event.preventDefault(); // evita que se recargue la página

          const usuario = document.getElementById('usuario').value;
          const contraseña = document.getElementById('contraseña').value;

          // Validación simple (puedes cambiar los datos por los que desees)
          if (usuario === 'Operacion_RK' && contraseña === 'tu_contraseña') {
            mensajeError.style.color = 'green';
            mensajeError.textContent = 'Ingreso correcto!';
            // Aquí puedes redirigir o hacer otra acción
          } else {
            mensajeError.style.color = 'red';
            mensajeError.textContent = 'Usuario o contraseña incorrectos.';
          }
        });
      });
    </script>
</body>
</html>
