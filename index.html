<!DOCTYPE html>
<html>
<head>
    <title>Login - Sistema</title>
</head>
<body>
    <h1>Iniciar Sesión</h1>
    <form id="loginForm">
        <label for="usuario">Usuario:</label>
        <input type="text" id="usuario" required><br><br>

        <label for="contrasena">Contraseña:</label>
        <input type="password" id="contrasena" required><br><br>

        <button type="submit">Iniciar Sesión</button>
    </form>
    <p id="mensaje" style="color:red;"></p>

    <script>
        // Lista de usuarios internos
        const usuarios = [
            { usuario: 'Operacion_RK', contrasena: 'Ope_Rk_doors_0198', nivel: 'Operador' },
            { usuario: 'Supervisor_RK', contrasena: 'Super_Rk_doors_9180', nivel: 'Supervisor' },
            { usuario: 'Direccion_RK', contrasena: 'Dirrec_Rk_doors_0000', nivel: 'Director' }
        ];

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const usuario = document.getElementById('usuario').value;
            const contrasena = document.getElementById('contrasena').value;
            const mensaje = document.getElementById('mensaje');

            // Buscar usuario en la lista
            const user = usuarios.find(u => u.usuario === usuario && u.contrasena === contrasena);

            if (user) {
                // Datos correctos
                mensaje.style.color = 'green';
                mensaje.textContent = 'Datos correctos! Nivel: ' + user.nivel;

                // Redirigir si es operador
                if (user.nivel === 'Operador') {
                    // Cambia 'perfil-operador.html' por el nombre de tu página del perfil
                    window.location.href = 'perfil-operador.html';
                }
                // Puedes agregar más condiciones para otros niveles
            } else {
                // Datos incorrectos
                mensaje.style.color = 'red';
                mensaje.textContent = 'Usuario o contraseña incorrectos.';
            }
        });
    </script>
</body>
</html>
</body>
</html>
