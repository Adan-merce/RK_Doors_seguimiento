<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Login - Sistema</title>
    <link rel="stylesheet" href="estilos.css" />
</head>
<body>
    <div id="loginContainer">
        <h1>Iniciar Sesión</h1>
        <form id="loginForm">
            <label for="usuario">Usuario:</label>
            <input type="text" id="usuario" required />

            <label for="contrasena">Contraseña:</label>
            <input type="password" id="contrasena" required />

            <button type="submit">Iniciar Sesión</button>
        </form>
        <p id="mensaje"></p>
    </div>

    <script>
        // Lista de usuarios internos
        const usuarios = [
            { usuario: 'Operacion_RK', contrasena: 'Ope_Rk_doors_0198', nivel: 'Operador' },
            { usuario: 'Supervisor_RK', contrasena: 'Super_Rk_doors_9180', nivel: 'Supervisor' },
            { usuario: 'Direccion_RK', contrasena: 'Dirrec_Rk_doors_0000', nivel: 'Director' }
        ];

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const usuario = document.getElementById('usuario').value;
            const contrasena = document.getElementById('contrasena').value;
            const mensaje = document.getElementById('mensaje');

            const user = usuarios.find(u => u.usuario === usuario && u.contrasena === contrasena);

            if (user) {
                mensaje.style.color = 'green';
                mensaje.textContent = 'Datos correctos! Nivel: ' + user.nivel;

                if (user.nivel === 'Operador') {
                    window.location.href = 'operador.html';
                } else if (user.nivel === 'Supervisor') {
                    window.location.href = 'supervisor.html';
                } else if (user.nivel === 'Director') {
                    window.location.href = 'director.html';
                }
            } else {
                mensaje.style.color = 'red';
                mensaje.textContent = 'Usuario o contraseña incorrectos.';
            }
        });
    </script>
</body>
</html>
